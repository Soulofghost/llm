services:
  - type: web
    name: library-management-system
    env: docker
    plan: free
    region: oregon
    envVars:
      - key: PORT
        value: 8080
      - key: DATABASE_URL
        fromDatabase:
          name: library-db
          property: connectionString

databases:
  - name: library-db
    plan: free
    region: oregon
